name: Create GitHub Sub-issue from Jira

on:
  repository_dispatch:
    types: [create-sub-issue]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create Sub-issue using GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # 이슈 생성 권한이 있는 PAT
          PARENT_ISSUE: ${{ github.event.client_payload.parent_issue_number }}
          ISSUE_TITLE: ${{ github.event.client_payload.title }}
          ISSUE_BODY: ${{ github.event.client_payload.body }}
        run: |
          # gh issue create 명령어를 사용해 서브 이슈 생성
          gh issue create \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --parent "$PARENT_ISSUE"
