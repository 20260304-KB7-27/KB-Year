- name: Create Sub-issue using GitHub CLI
  env:
    GH_TOKEN: ${{ secrets.GH_TOKEN }}
    PARENT_ISSUE_RAW: ${{ github.event.client_payload.parent_issue_number }}
    ISSUE_TITLE: ${{ github.event.client_payload.title }}
    ISSUE_BODY: ${{ github.event.client_payload.body }}
  run: |
    # 원본 값 확인
    echo "Raw Parent Issue: $PARENT_ISSUE_RAW"

    # 숫자만 추출 (#123 → 123)
    PARENT_ISSUE=$(echo "$PARENT_ISSUE_RAW" | grep -oE '[0-9]+' | head -n 1)

    # 추출 결과 확인
    echo "Parsed Parent Issue ID: $PARENT_ISSUE"

    # 값 없으면 실패 처리 (중요)
    if [ -z "$PARENT_ISSUE" ]; then
      echo "❌ Failed to extract issue number"
      exit 1
    fi

    # gh 실행
    GH_FORCE_PROJECT_V2_EXT=true gh issue create \
      --title "$ISSUE_TITLE" \
      --body "$ISSUE_BODY" \
      --parent "$PARENT_ISSUE"
